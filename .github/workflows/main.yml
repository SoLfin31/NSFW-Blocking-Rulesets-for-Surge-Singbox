name: Update Surge and Sing-box Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Convert Rules
        run: |
          # 下载原始域名列表并过滤注释和空行
          curl -L "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/nsfw-onlydomains.txt" \
            | grep -v '^#' \
            | grep -v '^$' \
            > domains.txt

          # 生成 Surge 规则
          sed 's/^/DOMAIN,/' domains.txt \
            > surge-nsfw.txt

          # 生成 Sing-box 规则集 (JSON 格式)
          # 使用 jq 将单行文本转换为 JSON 字符串数组，并打包进 sing-box 的规则集结构中
          jq -R . domains.txt | jq -s '{version: 1, rules: [{domain_suffix: .}]}' > singbox-nsfw.json

          # 删除临时文件
          rm domains.txt

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          # 追踪新生成的 singbox-nsfw.json，不再追踪旧的 yaml
          git add surge-nsfw.txt singbox-nsfw.json

          git commit -m "Auto update rules" || echo "No changes"

          git push
