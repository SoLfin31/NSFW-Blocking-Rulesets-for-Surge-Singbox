name: Update Surge and Sing-box Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Convert Rules
        run: |
          # 1. 下载原始上游域名列表并过滤注释和空行
          curl -L "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/nsfw-onlydomains.txt" \
            | grep -v '^#' \
            | grep -v '^$' \
            > domains.txt

          # 2. 检查本地是否存在自定义的 myDomains.txt
          # 如果存在，则过滤掉它里面的注释和空行，然后追加到临时总列表中
          if [ -f "myDomains.txt" ]; then
            echo "发现 myDomains.txt，正在并入自定义域名..."
            grep -v '^#' myDomains.txt | grep -v '^$' >> domains.txt
          fi

          # 3. 对合并后的总列表进行去重和重新排序
          # 这样可以防止你手动添加的域名与上游下载的域名发生重复
          sort -u domains.txt -o domains.txt

          # 4. 生成 Surge 规则 (使用合并去重后的列表)
          sed 's/^/DOMAIN,/' domains.txt \
            > surge-nsfw.txt

          # 5. 生成 Sing-box 规则集 (使用合并去重后的列表)
          jq -R . domains.txt | jq -s '{version: 1, rules: [{domain_suffix: .}]}' > singbox-nsfw.json

          # 6. 删除临时文件
          rm domains.txt

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add surge-nsfw.txt singbox-nsfw.json

          git commit -m "Auto update rules with custom domains" || echo "No changes"

          git push
